<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="naver-site-verification" content="a142515cf46c527f63fd9dce465e69dd1a02808c" />
    <meta name="google-site-verification" content="BtBII3918J1J9BnNiNfjVaPn0QXfIj5xoi1G_8qtFk4" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katana Perps Access Code "none" | Season 1 Early Access</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Use Katana Perps Access Code 'none' to unlock exclusive trading fee discounts and join Season 1 points early.">
    <meta name="keywords" content="Katana Perps, Access Code, Referral Code, none, Katana Network, Crypto Trading">

    <!-- Google Fonts: Shojumaru (Katana Style) & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Shojumaru&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --katana-yellow: #f3d42e;
            --bg-dark: #050505;
            --card-bg: #111111;
            --text-gray: #a0a0a0;
            --border-glow: rgba(243, 212, 46, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Background Decoration */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(243, 212, 46, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 20px var(--border-glow);
            position: relative;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--katana-yellow);
        }

        /* Katana Style Font */
        .logo {
            font-family: 'Shojumaru', cursive;
            color: var(--katana-yellow);
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(243, 212, 46, 0.4);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 900;
            font-size: 1.6rem;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .description {
            color: var(--text-gray);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Access Code Box */
        .code-container {
            background: #000;
            border: 2px solid #222;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .code-label {
            font-size: 0.7rem;
            color: var(--katana-yellow);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .code-value {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            box-sizing: border-box;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--katana-yellow);
            color: #000;
            box-shadow: 0 10px 20px rgba(243, 212, 46, 0.2);
        }

        .btn-primary:hover {
            background: #fff;
            transform: scale(1.03);
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background: #252525;
            border-color: var(--text-gray);
        }

        .btn-copy {
            background: transparent;
            color: var(--katana-yellow);
            border: 1px solid var(--katana-yellow);
            padding: 8px 20px;
            font-size: 0.8rem;
            border-radius: 8px;
            margin-top: 5px;
        }

        .btn-copy:hover {
            background: var(--katana-yellow);
            color: #000;
        }

        .footer-text {
            font-size: 0.75rem;
            color: #444;
            margin-top: 25px;
            font-weight: 600;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--katana-yellow);
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            z-index: 10;
            bottom: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 50px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 50px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">KATANA</div>
        <div class="subtitle">Perpetual Exchange</div>
        
        <h1>Access Code: <span style="color: var(--katana-yellow);">none</span></h1>
        <p class="description">Unlock trading fee discounts & secure your Season 1 points early access.</p>

        <div class="code-container">
            <span class="code-label">Official Referral Code</span>
            <div class="code-value" id="accessCode">none</div>
            <button class="btn-copy" onclick="copyCode()">COPY CODE</button>
        </div>

        <div class="button-group">
            <a href="https://perps.katana.network/r/none" class="btn btn-primary">JOIN KATANA PERPS</a>
            <a href="https://discord.gg/FwrVKnN8" class="btn btn-secondary">JOIN DISCORD</a>
        </div>

        <div class="footer-text">EARLY ACCESS MATTERS • SEASON 1</div>
    </div>

    <div id="toast">CODE COPIED TO CLIPPED! ⚔️</div>

    <script>
        function copyCode() {
            const code = document.getElementById('accessCode').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
            });
        }
    </script>
</body>
</html>
